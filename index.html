<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Momentum</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:#F2EFF9}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(123,111,224,.3);border-radius:3px}
input,select,textarea,button{font-family:inherit}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useRef,useCallback}=React;

// ─── Storage ──────────────────────────────────────────────────────────────────
const KEY="momentum_v8";
const load=()=>{try{const r=localStorage.getItem(KEY);return r?JSON.parse(r):null;}catch{return null;}};
const save=(s)=>{try{localStorage.setItem(KEY,JSON.stringify(s));}catch{}};

// ─── Built-in tracks (always present) ────────────────────────────────────────
const BUILTIN_TRACKS={
  sat: {name:"SAT Prep",color:"#7B6FE0",light:"#ECEAFF",icon:"✏️",builtin:true},
  res: {name:"Research",color:"#2EAF7D",light:"#E0F5EC",icon:"🔬",builtin:true},
  gwc: {name:"Girls Who Code",color:"#D4608A",light:"#FCEAF2",icon:"💻",builtin:true},
  frc: {name:"FRC / Java",color:"#D4841A",light:"#FEF0D8",icon:"🤖",builtin:true},
  yolo:{name:"YOLO + RPi",color:"#4AA8D4",light:"#E0F4FD",icon:"📷",builtin:true},
  int: {name:"Internship",color:"#6D5FD4",light:"#ECEAFF",icon:"💼",builtin:true},
  vln: {name:"Violin",color:"#C45A3A",light:"#FDEAE4",icon:"🎻",builtin:true},
  vol: {name:"Volunteering",color:"#E06B2E",light:"#FEF0E4",icon:"🤝",builtin:true},
  bio: {name:"Biomed",color:"#1B8A6B",light:"#DFF5EE",icon:"🧬",builtin:true},
  sch: {name:"School",color:"#888880",light:"#F0EEE8",icon:"📚",builtin:true},
  soc: {name:"Social",color:"#C4703A",light:"#FEEADA",icon:"👥",builtin:true},
};

const PHASE1_LOCKED=["gwc","frc","yolo","int"];
const FLOWERS=["🌸","🌺","🌼","🌻","🌷","💐","🪷","🌹"];
const DOW=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
const today=()=>new Date().toISOString().slice(0,10);
const DAILY_LIMIT_FULL=()=>5;

const GRASS=["Step outside for 5 minutes — your brain will thank you.","Put the screen down and touch some actual grass.","Go outside — even just the front steps count.","Eyes off screen, feet on ground. Just 5 minutes.","Sunshine break! You've more than earned it.","A walk around the block beats another scroll session.","Stand outside and look at something far away.","Fresh air loading… please proceed to nearest exit.","Your future self thanks you for this little break.","Water a plant. Look at the sky. Come back refreshed.","Close the laptop. Feel the wind. Back in 5.","Even 3 minutes of sunlight resets your focus."];

function seededShuffle(arr,seed){const a=[...arr];let s=seed;for(let i=a.length-1;i>0;i--){s=(s*1664525+1013904223)&0xffffffff;const j=Math.abs(s)%(i+1);[a[i],a[j]]=[a[j],a[i]];}return a;}
function dateSeed(){return today().split("-").reduce((acc,n)=>acc*31+parseInt(n),0);}

// ─── Default state ────────────────────────────────────────────────────────────
function defaults(){
  return{
    dark:false,phase:1,streak:0,lastDate:null,capDate:null,cap:null,
    projTitle:"",nextId:200,vlnGoalMins:30,volHoursGoal:10,
    customTracks:{}, // user-added tracks: {key:{name,color,light,icon}}
    pinnedTaskIds:[], // tasks manually assigned to today
    intHours:{
      Mon:{s:"09:00",e:"17:00",off:false},Tue:{s:"09:00",e:"17:00",off:false},
      Wed:{s:"09:00",e:"17:00",off:false},Thu:{s:"09:00",e:"17:00",off:false},
      Fri:{s:"09:00",e:"17:00",off:false},
    },
    tasks:[
      {id:1,name:"Reading comprehension drill",track:"sat",mins:45,cap:"any",subs:[{t:"Passages 1-2",done:false},{t:"Passages 3-5",done:false},{t:"Review wrong answers",done:false}],done:false},
      {id:2,name:"Narrow research question",track:"res",mins:30,cap:"any",subs:[{t:"Brainstorm 3 topics",done:false},{t:"Pick the strongest one",done:false}],done:false},
      {id:3,name:"SAT math timed section",track:"sat",mins:60,cap:"full",subs:[{t:"Complete all problems",done:false},{t:"Score & log it",done:false},{t:"Review every error",done:false}],done:false},
      {id:8,name:"Violin practice",track:"vln",mins:30,cap:"any",subs:[{t:"Scales warmup",done:false},{t:"Current piece",done:false},{t:"Sight-reading",done:false}],done:false},
    ],
    school:[
      {id:50,name:"AP Lang final essay",cls:"AP Lang",due:"2025-06-10",mins:90,subs:[{t:"Outline",done:true},{t:"Draft",done:false},{t:"Proofread",done:false}]},
    ],
    social:[{id:60,name:"Movie night",date:"2025-05-18",time:"19:00",who:"Maya, Jordan"}],
    satLog:[],vlnLog:[],
    volLog:[], // {id,date,org,hours,desc}
    biomLectures:[], // {id,date,title,notes,watched:false}
    biomAssignments:[], // {id,name,due,mins,subs:[],done:false}
    rj:{ideas:[{t:"Study urban heat island effects",date:"2025-05-15"}],questions:[{t:"How does green space reduce urban temperature?",date:"2025-05-15"}],sources:[],notes:[],timeline:[{name:"Choose research topic",date:"2025-05-20"},{name:"First mentor meeting",date:"2025-06-05"}],todo:[{t:"Email potential mentor",done:false}]},
    colleges:[],scholarships:[],map:{},
  };
}

// ─── Theme ────────────────────────────────────────────────────────────────────
const mkT=(dark)=>dark?{
  bg:"#16121F",surf:"#201C2E",surf2:"#2A2540",border:"#3D3760",
  text:"#EDE8FF",sub:"#A89FCC",mute:"#6B6290",
  acc:"#9B8FFF",accBg:"#2D2850",accText:"#C8C0FF",
  streakBg:"#2A1F0A",streakT:"#FFB347",grassBg:"#0D2018",grassT:"#5DCA8A",
  inp:"#1A1530",success:"#2EAF7D",danger:"#E24B4A",
  tb:(t,allTracks)=>`${allTracks[t]?.color||"#888"}28`,tc:(t,allTracks)=>allTracks[t]?.color||"#888",
}:{
  bg:"#F2EFF9",surf:"#FFFFFF",surf2:"#EDE9F8",border:"#DDD8EE",
  text:"#1E1840",sub:"#5E5480",mute:"#A89FC4",
  acc:"#7B6FE0",accBg:"#ECEAFF",accText:"#4A3FAA",
  streakBg:"#FFF5E0",streakT:"#9A6A0A",grassBg:"#EAF8F0",grassT:"#1A7A50",
  inp:"#F8F6FF",success:"#1A9060",danger:"#C0392B",
  tb:(t,allTracks)=>allTracks[t]?.light||"#F0EEE8",tc:(t,allTracks)=>allTracks[t]?.color||"#888",
};

// ─── Shared UI ────────────────────────────────────────────────────────────────
const Tag=({track,T,allTracks})=>(
  <span style={{display:"inline-flex",alignItems:"center",gap:3,fontSize:11,fontWeight:700,padding:"2px 9px",borderRadius:20,background:T.tb(track,allTracks),color:T.tc(track,allTracks)}}>
    {allTracks[track]?.icon} {allTracks[track]?.name||track}
  </span>
);

const PBar=({pct,color,h=5,style={}})=>(
  <div style={{height:h,borderRadius:3,background:"rgba(128,128,128,.15)",overflow:"hidden",...style}}>
    <div style={{height:"100%",width:`${Math.min(100,Math.max(0,pct))}%`,background:color,borderRadius:3,transition:"width .4s"}}/>
  </div>
);

const Chk=({done,onClick,T})=>(
  <div onClick={e=>{e.stopPropagation();onClick();}} style={{width:18,height:18,borderRadius:5,border:done?"none":`2px solid ${T.border}`,background:done?T.success:"transparent",cursor:"pointer",flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center"}}>
    {done&&<svg width="11" height="9"><polyline points="1,5 4,8 10,1" fill="none" stroke="#fff" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/></svg>}
  </div>
);

const SH=({children,T,style={}})=><div style={{fontSize:11,fontWeight:700,color:T.mute,letterSpacing:".07em",textTransform:"uppercase",marginBottom:7,...style}}>{children}</div>;

function Card({children,style={},onClick}){const T=window.__T;return<div onClick={onClick} style={{background:T.surf,border:`1px solid ${T.border}`,borderRadius:12,padding:"13px 15px",...style}}>{children}</div>;}
function Inp({value,onChange,placeholder,type="text",style={},onKeyDown,disabled=false}){const T=window.__T;return<input type={type} value={value} onChange={onChange} placeholder={placeholder} onKeyDown={onKeyDown} disabled={disabled} style={{fontSize:13,padding:"7px 10px",border:`1px solid ${T.border}`,borderRadius:8,background:disabled?T.surf2:T.inp,color:T.text,width:"100%",fontFamily:"inherit",...style}}/>;}
function Sel({value,onChange,children,style={}}){const T=window.__T;return<select value={value} onChange={onChange} style={{fontSize:13,padding:"7px 10px",border:`1px solid ${T.border}`,borderRadius:8,background:T.inp,color:T.text,width:"100%",fontFamily:"inherit",...style}}>{children}</select>;}
function BtnP({children,onClick,style={}}){const T=window.__T;return<button onClick={onClick} style={{fontSize:13,padding:"7px 16px",border:"none",borderRadius:8,background:T.acc,color:"#fff",cursor:"pointer",fontFamily:"inherit",fontWeight:700,...style}}>{children}</button>;}
function BtnN({children,onClick,style={}}){const T=window.__T;return<button onClick={onClick} style={{fontSize:13,padding:"7px 14px",border:`1px solid ${T.border}`,borderRadius:8,background:T.surf,color:T.text,cursor:"pointer",fontFamily:"inherit",...style}}>{children}</button>;}
function BtnDanger({children,onClick,style={}}){const T=window.__T;return<button onClick={onClick} style={{fontSize:12,padding:"5px 12px",border:`1px solid ${T.danger}`,borderRadius:8,background:"transparent",color:T.danger,cursor:"pointer",fontFamily:"inherit",...style}}>{children}</button>;}
function Lbl({children}){const T=window.__T;return<div style={{fontSize:12,color:T.sub,marginBottom:3}}>{children}</div>;}
const G2=({children,style={}})=><div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,...style}}>{children}</div>;
const G3=({children,style={}})=><div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,...style}}>{children}</div>;
const Row=({children,style={}})=><div style={{display:"flex",flexDirection:"column",gap:8,...style}}>{children}</div>;

// ─── Task Modal ───────────────────────────────────────────────────────────────
function TaskModal({taskId,S,upd,onClose,allTracks}){
  const T=window.__T;
  const isSchool=!!S.school.find(a=>a.id===taskId);
  const isBiom=!!S.biomAssignments?.find(a=>a.id===taskId);
  const task=isSchool?S.school.find(a=>a.id===taskId):isBiom?S.biomAssignments.find(a=>a.id===taskId):S.tasks.find(t=>t.id===taskId);
  if(!task)return null;
  const track=isSchool?"sch":isBiom?"bio":task.track;
  const color=allTracks[track]?.color||"#888";
  const doneSubs=task.subs.filter(s=>s.done).length;
  const p=task.subs.length?Math.round(doneSubs/task.subs.length*100):(task.done?100:0);
  const [editingSubIdx,setEditingSubIdx]=useState(null);
  const [editingSubText,setEditingSubText]=useState("");
  const [newSubText,setNewSubText]=useState("");

  function toggleSub(si){upd(s=>{
    const getArr=()=>isSchool?[...s.school]:isBiom?[...s.biomAssignments]:[...s.tasks];
    const key=isSchool?"school":isBiom?"biomAssignments":"tasks";
    const arr=getArr();const idx=arr.findIndex(x=>x.id===taskId);
    const item={...arr[idx],subs:arr[idx].subs.map((sub,i)=>i===si?{...sub,done:!sub.done}:sub)};
    arr[idx]=item;return{...s,[key]:arr};
  });}
  function renameSub(si){
    if(!editingSubText.trim()){setEditingSubIdx(null);return;}
    upd(s=>{
      const key=isSchool?"school":isBiom?"biomAssignments":"tasks";
      const arr=[...s[key]];const idx=arr.findIndex(x=>x.id===taskId);
      arr[idx]={...arr[idx],subs:arr[idx].subs.map((sub,i)=>i===si?{...sub,t:editingSubText.trim()}:sub)};
      return{...s,[key]:arr};
    });setEditingSubIdx(null);
  }
  function deleteSub(si){upd(s=>{
    const key=isSchool?"school":isBiom?"biomAssignments":"tasks";
    const arr=[...s[key]];const idx=arr.findIndex(x=>x.id===taskId);
    arr[idx]={...arr[idx],subs:arr[idx].subs.filter((_,i)=>i!==si)};
    return{...s,[key]:arr};
  });}
  function addSub(){
    if(!newSubText.trim())return;
    upd(s=>{
      const key=isSchool?"school":isBiom?"biomAssignments":"tasks";
      const arr=[...s[key]];const idx=arr.findIndex(x=>x.id===taskId);
      arr[idx]={...arr[idx],subs:[...arr[idx].subs,{t:newSubText.trim(),done:false}]};
      return{...s,[key]:arr};
    });setNewSubText("");
  }
  function toggleDone(){upd(s=>({...s,tasks:s.tasks.map(t=>t.id===taskId?{...t,done:!t.done}:t)}));}

  return(
    <div onClick={onClose} style={{position:"fixed",inset:0,background:"rgba(0,0,0,.6)",zIndex:300,display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
      <div onClick={e=>e.stopPropagation()} style={{background:T.surf,border:`1px solid ${T.border}`,borderRadius:18,padding:28,width:"100%",maxWidth:540,maxHeight:"88vh",overflowY:"auto",position:"relative"}}>
        <button onClick={onClose} style={{position:"absolute",top:14,right:14,background:"none",border:"none",fontSize:22,cursor:"pointer",color:T.mute,lineHeight:1}}>✕</button>
        <div style={{marginBottom:8}}><Tag track={track} T={T} allTracks={allTracks}/></div>
        <div style={{fontSize:20,fontWeight:700,color:T.text,marginBottom:4}}>{task.name}</div>
        <div style={{fontSize:12,color:T.sub,marginBottom:12}}>{isSchool||isBiom?(task.due?`Due ${task.due}`:""):(`~${task.mins} min`)}</div>
        <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:4}}>
          <PBar pct={p} color={color} h={8} style={{flex:1}}/>
          <span style={{fontSize:15,fontWeight:700,color:T.text}}>{p}%</span>
        </div>
        <div style={{fontSize:12,color:T.mute,marginBottom:18}}>{doneSubs}/{task.subs.length} subtasks complete</div>
        <SH T={T}>Subtasks <span style={{fontWeight:400,textTransform:"none",fontSize:10}}>(tap pencil to rename · tap ✕ to delete)</span></SH>
        {task.subs.map((sub,si)=>(
          <div key={si} style={{padding:"10px 0",borderBottom:`1px solid ${T.border}`}}>
            {editingSubIdx===si?(
              <div style={{display:"flex",gap:8,alignItems:"center"}}>
                <Inp value={editingSubText} onChange={e=>setEditingSubText(e.target.value)}
                  onKeyDown={e=>{if(e.key==="Enter")renameSub(si);if(e.key==="Escape")setEditingSubIdx(null);}} style={{flex:1}}/>
                <BtnP onClick={()=>renameSub(si)} style={{padding:"5px 12px",fontSize:12}}>Save</BtnP>
                <BtnN onClick={()=>setEditingSubIdx(null)} style={{padding:"5px 10px",fontSize:12}}>✕</BtnN>
              </div>
            ):(
              <div style={{display:"flex",alignItems:"center",gap:10}}>
                <Chk done={sub.done} onClick={()=>toggleSub(si)} T={T}/>
                <span style={{flex:1,fontSize:14,color:sub.done?T.mute:T.text,textDecoration:sub.done?"line-through":"none"}}>{sub.t}</span>
                <PBar pct={sub.done?100:0} color={color} h={3} style={{width:50}}/>
                <button onClick={()=>{setEditingSubIdx(si);setEditingSubText(sub.t);}} style={{background:"none",border:"none",cursor:"pointer",color:T.mute,fontSize:14,padding:"0 4px"}}>✏️</button>
                <button onClick={()=>deleteSub(si)} style={{background:"none",border:"none",cursor:"pointer",color:T.mute,fontSize:14,padding:"0 4px"}}>✕</button>
              </div>
            )}
          </div>
        ))}
        <div style={{marginTop:12,display:"flex",gap:8,alignItems:"center"}}>
          <Inp value={newSubText} onChange={e=>setNewSubText(e.target.value)} placeholder="Add a subtask…" onKeyDown={e=>e.key==="Enter"&&addSub()} style={{flex:1}}/>
          <BtnP onClick={addSub} style={{padding:"6px 14px",fontSize:12}}>+ Add</BtnP>
        </div>
        {!isSchool&&!isBiom&&(
          <div style={{marginTop:16,display:"flex",alignItems:"center",gap:12,paddingTop:12,borderTop:`1px solid ${T.border}`}}>
            <Chk done={task.done} onClick={toggleDone} T={T}/>
            <span style={{fontSize:13,color:T.sub}}>Mark entire task complete</span>
          </div>
        )}
      </div>
    </div>
  );
}

// ─── Track Page ───────────────────────────────────────────────────────────────
function TrackPage({track,S,upd,setModal,allTracks}){
  const T=window.__T;
  const tr=allTracks[track];
  const tasks=S.tasks.filter(t=>t.track===track);
  const totalSubs=tasks.reduce((a,t)=>a+t.subs.length,0);
  const doneSubs=tasks.reduce((a,t)=>a+t.subs.filter(s=>s.done).length,0);
  const overallPct=totalSubs?Math.round(doneSubs/totalSubs*100):0;
  return(
    <div style={{display:"flex",flexDirection:"column",gap:14}}>
      <div style={{display:"flex",alignItems:"center",gap:12}}>
        <span style={{fontSize:28}}>{tr?.icon}</span>
        <div>
          <div style={{fontSize:18,fontWeight:700,color:T.text}}>{tr?.name}</div>
          <div style={{fontSize:12,color:T.sub}}>{tasks.length} tasks · {doneSubs}/{totalSubs} subtasks done</div>
        </div>
      </div>
      <Card>
        <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:4}}>
          <div style={{fontSize:13,fontWeight:700,color:T.text}}>Overall progress</div>
          <span style={{marginLeft:"auto",fontSize:14,fontWeight:700,color:tr?.color}}>{overallPct}%</span>
        </div>
        <PBar pct={overallPct} color={tr?.color||T.acc} h={10}/>
      </Card>
      {tasks.length===0&&(
        <div style={{background:S.dark?"#2A1F0A":"#FFF8E8",border:"1px solid #D4841A",borderRadius:12,padding:"14px 16px",display:"flex",alignItems:"center",gap:12}}>
          <span style={{fontSize:22}}>⚠️</span>
          <div>
            <div style={{fontSize:14,fontWeight:700,color:"#D4841A"}}>No tasks yet for {tr?.name}</div>
            <div style={{fontSize:12,color:T.sub,marginTop:2}}>Head to <strong>➕ New task</strong> in the sidebar to add tasks to this track!</div>
          </div>
        </div>
      )}
      <SH T={T}>All tasks</SH>
      {tasks.map(task=>{
        const dSub=task.subs.filter(s=>s.done).length;
        const pct=task.subs.length?Math.round(dSub/task.subs.length*100):(task.done?100:0);
        return(
          <Card key={task.id} onClick={()=>setModal(task.id)} style={{cursor:"pointer"}}>
            <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",marginBottom:6}}>
              <div style={{fontSize:14,fontWeight:700,color:T.text,flex:1,paddingRight:8}}>{task.name}</div>
              <div style={{display:"flex",alignItems:"center",gap:8,flexShrink:0}}>
                <span style={{fontSize:12,color:T.mute}}>~{task.mins}m</span>
                {task.done&&<span style={{fontSize:11,background:T.success+"22",color:T.success,padding:"1px 8px",borderRadius:20,fontWeight:700}}>Done</span>}
              </div>
            </div>
            <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}>
              <PBar pct={pct} color={tr?.color||T.acc} h={6} style={{flex:1}}/>
              <span style={{fontSize:12,fontWeight:700,color:tr?.color,minWidth:32}}>{pct}%</span>
            </div>
            {task.subs.map((sub,si)=>(
              <div key={si} style={{display:"flex",alignItems:"center",gap:8,marginBottom:5}}>
                <Chk done={sub.done} onClick={()=>{upd(s=>{const arr=[...s.tasks];const idx=arr.findIndex(x=>x.id===task.id);arr[idx]={...arr[idx],subs:arr[idx].subs.map((ss,i)=>i===si?{...ss,done:!ss.done}:ss)};return{...s,tasks:arr};});}} T={T}/>
                <span style={{fontSize:12,color:sub.done?T.mute:T.sub,flex:1,textDecoration:sub.done?"line-through":"none"}}>{sub.t}</span>
              </div>
            ))}
            <div style={{fontSize:11,color:T.acc,marginTop:6}}>tap to expand & edit subtasks →</div>
          </Card>
        );
      })}
      {track==="sat"&&<SATInline S={S} upd={upd} T={T}/>}
      {track==="res"&&<ResearchInline S={S} T={T}/>}
      {track==="vln"&&<ViolinInline S={S} upd={upd} T={T}/>}
    </div>
  );
}

// ─── SAT inline ───────────────────────────────────────────────────────────────
function SATInline({S,upd,T}){
  const [f,setF]=useState({section:"Reading & Writing",mins:"",score:"",target:"",feel:"okay",notes:""});
  const latest=S.satLog[0]||null;
  function log(){if(!f.mins)return;upd(s=>({...s,satLog:[{id:s.nextId,date:today(),...f,mins:parseInt(f.mins)},...s.satLog],nextId:s.nextId+1}));setF(x=>({...x,mins:"",score:"",notes:"",target:""}));}
  return(<>
    <SH T={T} style={{marginTop:8}}>SAT practice log</SH>
    {latest?.score&&<Card style={{background:T.accBg,border:`1px solid ${T.acc}`}}>
      <div style={{fontSize:11,fontWeight:700,color:T.acc,textTransform:"uppercase",letterSpacing:".07em",marginBottom:6}}>Most recent score</div>
      <div style={{display:"flex",alignItems:"flex-end",gap:16,flexWrap:"wrap"}}>
        <div style={{fontSize:34,fontWeight:700,color:T.text}}>{latest.score}</div>
        <div><div style={{fontSize:13,color:T.sub}}>{latest.section}</div><div style={{fontSize:12,color:T.mute}}>{latest.date}</div>{latest.target&&<div style={{fontSize:12,color:T.acc}}>Target: {latest.target}</div>}</div>
      </div>
    </Card>}
    <Card>

// ─── Violin inline ────────────────────────────────────────────────────────────

// ─── Volunteering Page ────────────────────────────────────────────────────────

        <Card>
          <SH T={T}>Organizations</SH>

            })}

        </Card>
      )}

        <Card key={l.id} style={{display:"flex",alignItems:"flex-start",gap:10}}>

// ─── Biomed Page ──────────────────────────────────────────────────────────────
function BiomPage({S,upd,setModal}){
  const T=window.__T;
  const [tab,setTab]=useState("lectures");
  const [lf,setLf]=useState({title:"",date:today(),notes:""});
  const [af,setAf]=useState({name:"",due:"",mins:"45",subs:""});
  const lectures=S.biomLectures||[];
  const assignments=S.biomAssignments||[];
  const watchedCount=lectures.filter(l=>l.watched).length;

  function addLecture(){if(!lf.title.trim())return;upd(s=>({...s,biomLectures:[...( s.biomLectures||[]),{id:s.nextId,title:lf.title,date:lf.date,notes:lf.notes,watched:false}],nextId:s.nextId+1}));setLf({title:"",date:today(),notes:""});}
  function toggleWatched(id){upd(s=>({...s,biomLectures:(s.biomLectures||[]).map(l=>l.id===id?{...l,watched:!l.watched}:l)}));}
  function delLecture(id){upd(s=>({...s,biomLectures:(s.biomLectures||[]).filter(l=>l.id!==id)}));}
  function addAssignment(){if(!af.name.trim())return;const subs=af.subs.split("\n").map(l=>l.trim()).filter(Boolean).map(t=>({t,done:false}));upd(s=>({...s,biomAssignments:[...(s.biomAssignments||[]),{id:s.nextId,name:af.name,due:af.due,mins:parseInt(af.mins)||45,subs,done:false}],nextId:s.nextId+1}));setAf({name:"",due:"",mins:"45",subs:""});}
  function delAssignment(id){upd(s=>({...s,biomAssignments:(s.biomAssignments||[]).filter(a=>a.id!==id)}));}

  return(
    <div style={{display:"flex",flexDirection:"column",gap:14}}>
      <div style={{display:"flex",alignItems:"center",gap:10}}>

        {["lectures","assignments"].map(t=>(

        ))}
      </div>

      {tab==="lectures"&&(<>
        {lectures.length>0&&(
          <Card style={{background:T.accBg,border:`1px solid ${T.acc}`}}>
            <div style={{fontSize:11,fontWeight:700,color:T.acc,textTransform:"uppercase",letterSpacing:".07em",marginBottom:6}}>Progress</div>
            <div style={{fontSize:24,fontWeight:700,color:T.text}}>{watchedCount} / {lectures.length} watched</div>
            <PBar pct={lectures.length?Math.round(watchedCount/lectures.length*100):0} color={BUILTIN_TRACKS.bio.color} h={8} style={{marginTop:8}}/>
          </Card>
        )}
        <Card>
          <SH T={T}>Add lecture</SH>
          <Row>
            <G2>
              <div><Lbl>Lecture title</Lbl><Inp value={lf.title} onChange={e=>setLf(x=>({...x,title:e.target.value}))} onKeyDown={e=>e.key==="Enter"&&addLecture()} placeholder="e.g. Cell signaling pathways"/></div>
              <div><Lbl>Date</Lbl><Inp type="date" value={lf.date} onChange={e=>setLf(x=>({...x,date:e.target.value}))}/></div>
            </G2>
            <div><Lbl>Notes / topics covered</Lbl><Inp value={lf.notes} onChange={e=>setLf(x=>({...x,notes:e.target.value}))} placeholder="Key concepts, anything to review…"/></div>
            <BtnP onClick={addLecture}>Add lecture 📹</BtnP>
          </Row>
        </Card>
        <SH T={T}>All lectures</SH>
        {lectures.map(l=>(
          <Card key={l.id} style={{display:"flex",alignItems:"flex-start",gap:10,opacity:l.watched?.7:1}}>
            <div onClick={()=>toggleWatched(l.id)} style={{width:22,height:22,borderRadius:6,border:l.watched?"none":`2px solid ${T.border}`,background:l.watched?BUILTIN_TRACKS.bio.color:"transparent",cursor:"pointer",flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center",marginTop:2}}>
              {l.watched&&<svg width="12" height="10"><polyline points="1,5 5,9 11,1" fill="none" stroke="#fff" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/></svg>}
            </div>
            <div style={{flex:1}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>

                  <button onClick={()=>delLecture(l.id)} style={{background:"none",border:"none",cursor:"pointer",color:T.mute,fontSize:16}}>✕</button>
                </div>
              </div>
              {l.notes&&<div style={{fontSize:12,color:T.sub,marginTop:3}}>{l.notes}</div>}

            </div>
          </Card>
        ))}
        {lectures.length===0&&<div style={{fontSize:13,color:T.mute}}>No lectures added yet. Add your first above!</div>}
      </>)}

      {tab==="assignments"&&(<>
        <Card>
          <SH T={T}>Add assignment</SH>
          <Row>
            <G2>
              <div><Lbl>Assignment name</Lbl><Inp value={af.name} onChange={e=>setAf(x=>({...x,name:e.target.value}))} placeholder="e.g. Lab report — DNA extraction"/></div>
              <div><Lbl>Due date</Lbl><Inp type="date" value={af.due} onChange={e=>setAf(x=>({...x,due:e.target.value}))}/></div>
            </G2>
            <div><Lbl>Est. minutes</Lbl><Inp type="number" value={af.mins} onChange={e=>setAf(x=>({...x,mins:e.target.value}))} placeholder="45"/></div>
            <div><Lbl>Subtasks (one per line)</Lbl><textarea value={af.subs} onChange={e=>setAf(x=>({...x,subs:e.target.value}))} style={{fontSize:13,padding:"7px 10px",border:`1px solid ${T.border}`,borderRadius:8,background:T.inp,color:T.text,width:"100%",height:72,resize:"vertical",fontFamily:"inherit"}} placeholder={"Research\nOutline\nDraft\nProofread"}/></div>
            <BtnP onClick={addAssignment}>Add assignment 📝</BtnP>
          </Row>
        </Card>
        <SH T={T}>Assignments</SH>
        {assignments.map(a=>{
          const done=a.subs.filter(s=>s.done).length;
          const pct=a.subs.length?Math.round(done/a.subs.length*100):(a.done?100:0);
          return(
            <Card key={a.id} onClick={()=>setModal(a.id)} style={{cursor:"pointer"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:8}}>
                <div style={{flex:1}}>
                  <div style={{fontSize:14,fontWeight:700,color:T.text}}>{a.name}</div>
                  {a.due&&<div style={{fontSize:11,color:T.mute,marginTop:2}}>Due {a.due}</div>}
                </div>
                <div style={{display:"flex",gap:6,alignItems:"center"}}>
                  <span style={{fontSize:12,color:T.mute}}>~{a.mins}m</span>
                  <button onClick={e=>{e.stopPropagation();delAssignment(a.id);}} style={{background:"none",border:"none",cursor:"pointer",color:T.mute,fontSize:16}}>✕</button>
                </div>
              </div>
              <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:6}}>
                <PBar pct={pct} color={BUILTIN_TRACKS.bio.color} h={6} style={{flex:1}}/>
                <span style={{fontSize:12,fontWeight:700,color:BUILTIN_TRACKS.bio.color}}>{pct}%</span>
              </div>
              {a.subs.length>0&&<div style={{fontSize:11,color:T.sub}}>{done}/{a.subs.length} steps · tap to expand →</div>}
            </Card>
          );
        })}
        {assignments.length===0&&<div style={{fontSize:13,color:T.mute}}>No assignments yet. Add your first above!</div>}
      </>)}
    </div>
  );
}

// ─── Research Journal ─────────────────────────────────────────────────────────
function RJPage({S,upd}){

  function addE(type){const km={idea:"ideas",q:"questions",note:"notes",rtd:"todo"};const fm={idea:"idea",q:"q",note:"note",rtd:"rtd"};if(km[type]){const val=f[fm[type]];if(!val.trim())return;const entry=type==="rtd"?{t:val,done:false,date:today()}:{t:val,date:today()};upd(s=>({...s,rj:{...s.rj,[km[type]]:[...s.rj[km[type]],entry]}}));setF(x=>({...x,[fm[type]]:""}));}else if(type==="src"){if(!f.srcTitle.trim())return;upd(s=>({...s,rj:{...s.rj,sources:[...s.rj.sources,{title:f.srcTitle,url:f.srcUrl,note:f.srcNote,date:today()}]}}));setF(x=>({...x,srcTitle:"",srcUrl:"",srcNote:""}));}else if(type==="tl"){if(!f.tlName.trim())return;upd(s=>{const tl=[...s.rj.timeline,{name:f.tlName,date:f.tlDate}].sort((a,b)=>a.date>b.date?1:-1);return{...s,rj:{...s.rj,timeline:tl}};});setF(x=>({...x,tlName:"",tlDate:""}));}}

      {tab==="sources"&&<><Card><Lbl>Source title</Lbl><Inp value={f.srcTitle} onChange={e=>setF(x=>({...x,srcTitle:e.target.value}))} placeholder="Smith et al. 2023" style={{marginBottom:8}}/><G2 style={{marginBottom:8}}><div><Lbl>URL / DOI</Lbl><Inp value={f.srcUrl} onChange={e=>setF(x=>({...x,srcUrl:e.target.value}))} placeholder="https://..."/></div><div><Lbl>Key takeaway</Lbl><Inp value={f.srcNote} onChange={e=>setF(x=>({...x,srcNote:e.target.value}))} placeholder="Main point"/></div></G2><BtnP onClick={()=>addE("src")}>Add source</BtnP></Card>{S.rj.sources.map((e,i)=><Card key={i} style={{marginBottom:5}}><div style={{display:"flex",justifyContent:"space-between"}}><div style={{flex:1}}><div style={{fontSize:13,fontWeight:700,color:T.text}}>{e.title}</div>{e.url&&<div style={{fontSize:11,color:T.acc}}>{e.url}</div>}{e.note&&<div style={{fontSize:12,color:T.sub}}>{e.note}</div>}<div style={{fontSize:10,color:T.mute}}>{e.date}</div></div><button onClick={()=>del("sources",i)} style={{background:"none",border:"none",cursor:"pointer",color:T.mute,fontSize:16}}>✕</button></div></Card>)}</>}

      {tab==="todo"&&<><G2 style={{alignItems:"flex-end"}}><div><Lbl>Research to-do</Lbl><Inp value={f.rtd} onChange={e=>setF(x=>({...x,rtd:e.target.value}))} onKeyDown={e=>e.key==="Enter"&&addE("rtd")} placeholder="Email potential mentor"/></div><BtnP onClick={()=>addE("rtd")}>Add</BtnP></G2>{S.rj.todo.map((e,i)=><Card key={i} style={{display:"flex",alignItems:"center",gap:10,marginBottom:5}}><Chk done={e.done} onClick={()=>toggleTodo(i)} T={T}/><span style={{flex:1,fontSize:13,color:e.done?T.mute:T.text,textDecoration:e.done?"line-through":"none"}}>{e.t}</span><button onClick={()=>del("todo",i)} style={{background:"none",border:"none",cursor:"pointer",color:T.mute,fontSize:14}}>✕</button></Card>)}</>}

// ─── Today Page ───────────────────────────────────────────────────────────────
function TodayPage({S,upd,grassMsg,setModal,allTracks}){
  const T=window.__T;
  const seed=dateSeed();

  function filterTasks(tasks){return tasks.filter(t=>{
    if(S.phase===1&&PHASE1_LOCKED.includes(t.track))return false;
    if(!S.cap)return true;
    if(S.cap==="low")return t.cap==="low"||t.cap==="any";
    if(S.cap==="ok")return t.cap!=="full";
    return true;
  });}

  const allFiltered=filterTasks(S.tasks);
  const shuffled=seededShuffle(allFiltered,seed);
  const limit=S.cap==="low"?1:S.cap==="ok"?3:DAILY_LIMIT_FULL();
  const shown=shuffled.slice(0,limit);

  const activeTrackKeys=S.phase===1
    ?Object.keys(allTracks).filter(k=>!["sch","soc","gwc","frc","yolo","int"].includes(k))
    :Object.keys(allTracks).filter(k=>!["sch","soc"].includes(k));
  const emptyTracks=activeTrackKeys.filter(tk=>!["vol","bio"].includes(tk)&&!S.tasks.some(t=>t.track===tk));

  function setCap(c){upd(s=>({...s,cap:c,capDate:today()}));}

  useEffect(()=>{
    const done=S.tasks.filter(t=>t.done).length+S.school.filter(a=>a.subs.length&&a.subs.every(s=>s.done)).length;
    const total=S.tasks.length+S.school.length;
    const ratio=total?done/total:0;
    const fill=ratio===0?0:ratio<0.35?1:ratio<0.7?2:3;
    const key=today();
    if((S.map[key]||0)!==fill)upd(s=>({...s,map:{...s.map,[key]:fill}}));
  });

  const tileGrid={display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(148px,1fr))",gap:10};

  function TileCard({task,isSchool=false,isBiom=false}){
    const [hov,setHov]=useState(false);
    const track=isSchool?"sch":isBiom?"bio":task.track;
    const color=allTracks[track]?.color||"#888";
    const p=task.subs.length?Math.round(task.subs.filter(s=>s.done).length/task.subs.length*100):(task.done?100:0);
    return(
      <div onClick={()=>setModal(task.id)} onMouseEnter={()=>setHov(true)} onMouseLeave={()=>setHov(false)}
        style={{background:hov?T.surf2:T.surf,border:`1px solid ${hov?T.acc:T.border}`,borderRadius:12,padding:12,cursor:"pointer",transition:"all .15s",userSelect:"none"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:6}}>
          <Tag track={track} T={T} allTracks={allTracks}/>
          <span style={{fontSize:10,color:T.mute}}>{(isSchool||isBiom)&&task.due?"due "+task.due:(!isSchool&&!isBiom)?"~"+task.mins+"m":""}</span>
        </div>
        <div style={{fontSize:13,fontWeight:700,color:T.text,lineHeight:1.4,marginBottom:4}}>{task.name}</div>
        {task.subs.length>0&&<><PBar pct={p} color={color}/><div style={{fontSize:10,color:T.mute,marginTop:3,textAlign:"right"}}>{p}% · {task.subs.filter(s=>s.done).length}/{task.subs.length}</div></>}
        <div style={{fontSize:10,color:T.acc,marginTop:5}}>tap to expand →</div>
      </div>
    );
  }

  // Today's biom assignments (due today or undone)
  const todayBiomAssignments=(S.biomAssignments||[]).filter(a=>!a.subs.every(s=>s.done));

  return(
    <div style={{display:"flex",flexDirection:"column",gap:12}}>
      {!S.cap&&<Card>
        <div style={{fontSize:15,fontWeight:700,color:T.text,marginBottom:12}}>How charged are you today? 🔋</div>
        <div style={{display:"flex",gap:8}}>
          {[{k:"full",icon:"⚡",label:"Fully charged",sub:"Up to 5 tasks"},{k:"ok",icon:"🔋",label:"Running okay",sub:"3 tasks"},{k:"low",icon:"🪫",label:"Low battery",sub:"Just 1 thing"}].map(o=>(
            <div key={o.k} onClick={()=>setCap(o.k)} style={{flex:1,border:`1px solid ${T.border}`,borderRadius:12,padding:"12px 8px",textAlign:"center",cursor:"pointer",background:T.surf2,transition:"all .15s"}}>
              <div style={{fontSize:24,marginBottom:5}}>{o.icon}</div>
              <div style={{fontSize:13,fontWeight:700,color:T.text}}>{o.label}</div>
              <div style={{fontSize:11,color:T.sub,marginTop:2}}>{o.sub}</div>
            </div>
          ))}
        </div>
      </Card>}
      {S.cap&&<div style={{display:"flex",alignItems:"center",gap:8,fontSize:13,color:T.sub}}>
        <span>Today: <strong style={{color:T.text}}>{S.cap==="full"?"⚡ Fully charged":S.cap==="ok"?"🔋 Running okay":"🪫 Low battery"}</strong></span>
        <BtnN onClick={()=>upd(s=>({...s,cap:null,capDate:null}))} style={{fontSize:11,padding:"3px 10px"}}>Change</BtnN>
      </div>}
      <div style={{background:T.streakBg,borderRadius:10,padding:"10px 14px",display:"flex",alignItems:"center",gap:12}}>
        <span style={{fontSize:22}}>🔥</span>
        <div><div style={{fontSize:13,fontWeight:700,color:T.streakT}}>{S.streak}-day streak</div><div style={{fontSize:11,color:T.streakT,opacity:.8}}>Consistency beats intensity every time.</div></div>
      </div>
      <div style={{background:T.grassBg,borderRadius:10,padding:"10px 14px",display:"flex",alignItems:"center",gap:12}}>
        <span style={{fontSize:22}}>🌿</span>
        <div><div style={{fontSize:13,fontWeight:700,color:T.grassT}}>Touch grass reminder</div><div style={{fontSize:11,color:T.grassT,opacity:.85}}>{grassMsg}</div></div>
      </div>
      {emptyTracks.length>0&&(
        <div style={{background:S.dark?"#2A1F0A":"#FFF8E8",border:"1px solid #D4841A",borderRadius:12,padding:"12px 14px",display:"flex",alignItems:"flex-start",gap:12}}>
          <span style={{fontSize:20}}>⚠️</span>
          <div>
            <div style={{fontSize:13,fontWeight:700,color:"#D4841A",marginBottom:3}}>Some tracks need tasks!</div>
            <div style={{fontSize:12,color:T.sub}}>{emptyTracks.map(tk=>`${allTracks[tk]?.icon} ${allTracks[tk]?.name}`).join(" · ")}</div>
            <div style={{fontSize:11,color:T.mute,marginTop:4}}>Go to ➕ New task to fill these tracks.</div>
          </div>
        </div>
      )}
      {S.phase===1&&<div style={{fontSize:11,color:T.mute}}>🔒 GWC, FRC, YOLO+RPi & Internship unlock in Phase 2</div>}
      {S.cap&&<>
        {/* Pinned tasks */}
        {(S.pinnedTaskIds||[]).length>0&&(()=>{
          const pinned=[...S.tasks,...S.school,...(S.biomAssignments||[])].filter(t=>(S.pinnedTaskIds||[]).includes(t.id));
          if(!pinned.length)return null;
          return<div>
            <SH T={T}>📌 Assigned today <span style={{fontWeight:400,textTransform:"none",letterSpacing:0,fontSize:10}}>({pinned.length} pinned from All tasks)</span></SH>
            <div style={tileGrid}>{pinned.map(t=>{
              const isSchool=!!S.school.find(a=>a.id===t.id);
              const isBiom=!!(S.biomAssignments||[]).find(a=>a.id===t.id);
              return<TileCard key={t.id} task={t} isSchool={isSchool} isBiom={isBiom}/>;
            })}</div>
          </div>;
        })()}
        <div>
          <SH T={T}>Today's tasks <span style={{fontWeight:400,textTransform:"none",letterSpacing:0,fontSize:10}}>(shuffled daily · {shown.length}/{allFiltered.length} shown)</span></SH>
          {shown.length?<div style={tileGrid}>{shown.map(t=><TileCard key={t.id} task={t}/>)}</div>:<div style={{fontSize:13,color:T.mute}}>No tasks match this capacity level.</div>}
        </div>
        {S.school.length>0&&<div><SH T={T}>School assignments</SH><div style={tileGrid}>{S.school.slice(0,S.cap==="low"?1:999).map(a=><TileCard key={a.id} task={a} isSchool/>)}</div></div>}
        {todayBiomAssignments.length>0&&<div><SH T={T}>🧬 Biomed due</SH><div style={tileGrid}>{todayBiomAssignments.slice(0,S.cap==="low"?1:999).map(a=><TileCard key={a.id} task={a} isBiom/>)}</div></div>}
        {S.social.length>0&&<div><SH T={T}>Coming up</SH><div style={tileGrid}>{S.social.map(s=><div key={s.id} style={{background:T.surf,border:`1px solid ${T.border}`,borderRadius:12,padding:12}}><Tag track="soc" T={T} allTracks={allTracks}/><div style={{fontSize:13,fontWeight:700,color:T.text,marginTop:6}}>{s.name}</div><div style={{fontSize:11,color:T.mute,marginTop:3}}>{s.date}{s.time&&" · "+s.time}{s.who&&" · "+s.who}</div></div>)}</div></div>}
      </>}
    </div>
  );
}

      })}

// ─── All Tasks Page ───────────────────────────────────────────────────────────
function AllTasksPage({S,upd,setModal,allTracks}){
  const T=window.__T;
  const [filterTrack,setFilterTrack]=useState("all");
  const [filterStatus,setFilterStatus]=useState("all"); // all | todo | done
  const [search,setSearch]=useState("");
  const [assignedIds,setAssignedIds]=useState(()=>new Set(S.pinnedTaskIds||[]));

  // Keep pinnedTaskIds in sync with state
  useEffect(()=>{
    upd(s=>({...s,pinnedTaskIds:[...assignedIds]}));
  },[assignedIds]);

  // All tasks from all sources
  const allItems=[
    ...S.tasks.map(t=>({...t,_type:"task"})),
    ...S.school.map(a=>({...a,track:"sch",_type:"school"})),
    ...(S.biomAssignments||[]).map(a=>({...a,track:"bio",_type:"biom"})),
  ];

  // Filter
  const filtered=allItems.filter(t=>{
    if(filterTrack!=="all"&&t.track!==filterTrack)return false;
    if(filterStatus==="done"){
      const done=t.subs?.length?t.subs.every(s=>s.done):t.done;
      if(!done)return false;
    }
    if(filterStatus==="todo"){
      const done=t.subs?.length?t.subs.every(s=>s.done):t.done;
      if(done)return false;
    }
    if(search.trim()){
      const q=search.toLowerCase();
      if(!t.name.toLowerCase().includes(q)&&!(allTracks[t.track]?.name||"").toLowerCase().includes(q))return false;
    }
    return true;
  });

  // Track options for filter
  const trackOptions=[...new Set(allItems.map(t=>t.track))];

  function toggleAssign(id){
    setAssignedIds(prev=>{
      const next=new Set(prev);
      if(next.has(id))next.delete(id);else next.add(id);
      return next;
    });
  }

  function getProgress(t){
    if(!t.subs||t.subs.length===0)return t.done?100:0;
    return Math.round(t.subs.filter(s=>s.done).length/t.subs.length*100);
  }

  const assignedCount=assignedIds.size;

  return(
    <div style={{display:"flex",flexDirection:"column",gap:14}}>
      {/* Header */}
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:8}}>
        <div>
          <div style={{fontSize:16,fontWeight:700,color:T.text}}>📋 All tasks</div>
          <div style={{fontSize:12,color:T.sub,marginTop:2}}>{allItems.length} total · {assignedCount} assigned to today</div>
        </div>
        {assignedCount>0&&(
          <div style={{background:T.accBg,border:`1px solid ${T.acc}`,borderRadius:10,padding:"6px 14px",fontSize:12,fontWeight:700,color:T.acc}}>
            ⚡ {assignedCount} pinned to today
          </div>
        )}
      </div>

      {/* Search + filters */}
      <Card style={{padding:"10px 12px"}}>
        <div style={{display:"flex",flexDirection:"column",gap:8}}>
          <Inp value={search} onChange={e=>setSearch(e.target.value)} placeholder="🔍 Search tasks…"/>
          <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
            {/* Track filter */}
            <div style={{display:"flex",gap:4,flexWrap:"wrap",flex:1}}>
              {["all",...trackOptions].map(k=>{
                const on=filterTrack===k;
                const tr=allTracks[k];
                return(
                  <div key={k} onClick={()=>setFilterTrack(k)}
                    style={{fontSize:11,padding:"4px 10px",borderRadius:20,cursor:"pointer",border:`1px solid ${on?(tr?.color||T.acc):T.border}`,background:on?(tr?.light||T.accBg):"transparent",color:on?(tr?.color||T.acc):T.sub,fontWeight:on?700:400,transition:"all .12s",whiteSpace:"nowrap"}}>
                    {k==="all"?"All tracks":`${tr?.icon||""} ${tr?.name||k}`}
                  </div>
                );
              })}
            </div>
          </div>
          {/* Status filter */}
          <div style={{display:"flex",gap:6}}>
            {[["all","All"],["todo","To-do"],["done","Done ✓"]].map(([v,label])=>(
              <div key={v} onClick={()=>setFilterStatus(v)}
                style={{fontSize:11,padding:"4px 12px",borderRadius:20,cursor:"pointer",border:`1px solid ${filterStatus===v?T.acc:T.border}`,background:filterStatus===v?T.accBg:"transparent",color:filterStatus===v?T.acc:T.sub,fontWeight:filterStatus===v?700:400,transition:"all .12s"}}>
                {label}
              </div>
            ))}
          </div>
        </div>
      </Card>

      {/* Info callout */}
      <div style={{background:T.surf2,borderRadius:10,padding:"9px 13px",fontSize:12,color:T.sub,display:"flex",alignItems:"center",gap:8}}>
        <span style={{fontSize:16}}>📌</span>
        <span>Tap <strong style={{color:T.text}}>Assign to today</strong> on any task to pin it to your Today page. Tap again to unpin.</span>
      </div>

      {/* Task list */}
      {filtered.length===0&&(
        <div style={{fontSize:13,color:T.mute,textAlign:"center",padding:"24px 0"}}>
          {search?"No tasks match your search.":"No tasks here yet."}
        </div>
      )}
      {filtered.map(t=>{
        const pct=getProgress(t);
        const tr=allTracks[t.track];
        const isAssigned=assignedIds.has(t.id);
        const isDone=t.subs?.length?t.subs.every(s=>s.done):t.done;
        return(
          <Card key={t.id} style={{opacity:isDone?.65:1,transition:"opacity .2s"}}>
            <div style={{display:"flex",alignItems:"flex-start",gap:10}}>
              {/* Color accent bar */}
              <div style={{width:3,borderRadius:2,background:tr?.color||T.acc,alignSelf:"stretch",flexShrink:0,minHeight:40}}/>
              <div style={{flex:1,minWidth:0}}>
                {/* Top row */}
                <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",marginBottom:5,gap:8}}>
                  <div style={{flex:1,minWidth:0}}>
                    <span style={{fontSize:11,fontWeight:700,padding:"2px 8px",borderRadius:20,background:tr?.light||T.surf2,color:tr?.color||T.acc,marginRight:6}}>
                      {tr?.icon} {tr?.name||t.track}
                    </span>
                    <div style={{fontSize:14,fontWeight:700,color:isDone?T.mute:T.text,marginTop:5,textDecoration:isDone?"line-through":"none"}}>{t.name}</div>
                  </div>
                  <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:4,flexShrink:0}}>
                    {t.mins&&<span style={{fontSize:11,color:T.mute}}>~{t.mins}m</span>}
                    {t.due&&<span style={{fontSize:11,background:T.surf2,color:T.sub,padding:"1px 7px",borderRadius:20}}>due {t.due}</span>}
                  </div>
                </div>
                {/* Progress bar */}
                {t.subs?.length>0&&(
                  <div style={{marginBottom:6}}>
                    <PBar pct={pct} color={tr?.color||T.acc} h={5}/>
                    <div style={{fontSize:10,color:T.mute,marginTop:2}}>{t.subs.filter(s=>s.done).length}/{t.subs.length} subtasks · {pct}%</div>
                  </div>
                )}
                {/* Subtask preview */}
                {t.subs?.length>0&&(
                  <div style={{display:"flex",flexWrap:"wrap",gap:4,marginBottom:8}}>
                    {t.subs.slice(0,4).map((sub,si)=>(
                      <span key={si} style={{fontSize:10,padding:"2px 8px",borderRadius:20,background:sub.done?T.success+"22":T.surf2,color:sub.done?T.success:T.mute,textDecoration:sub.done?"line-through":"none"}}>
                        {sub.done?"✓ ":""}{sub.t}
                      </span>
                    ))}
                    {t.subs.length>4&&<span style={{fontSize:10,color:T.mute}}>+{t.subs.length-4} more</span>}
                  </div>
                )}
                {/* Action buttons */}
                <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                  <button onClick={()=>setModal(t.id)}
                    style={{fontSize:11,padding:"4px 12px",border:`1px solid ${T.border}`,borderRadius:8,background:T.surf,color:T.sub,cursor:"pointer",fontFamily:"inherit"}}>
                    ✏️ Open &amp; edit
                  </button>
                  <button onClick={()=>toggleAssign(t.id)}
                    style={{fontSize:11,padding:"4px 12px",border:`1px solid ${isAssigned?T.acc:T.border}`,borderRadius:8,background:isAssigned?T.accBg:T.surf,color:isAssigned?T.acc:T.sub,cursor:"pointer",fontFamily:"inherit",fontWeight:isAssigned?700:400,transition:"all .15s"}}>
                    {isAssigned?"📌 Assigned to today":"📌 Assign to today"}
                  </button>
                </div>
              </div>
            </div>
          </Card>
        );
      })}
    </div>
  );
}

// ─── APP ROOT ─────────────────────────────────────────────────────────────────
function App(){
  const [S,setS]=useState(()=>{
    const saved=load();
    if(saved){const d=defaults();return{...d,...saved,rj:{...d.rj,...(saved.rj||{})},intHours:{...d.intHours,...(saved.intHours||{})},customTracks:{...(saved.customTracks||{})}};}
    return defaults();
  });
  const [page,setPage]=useState("today");
  const [modal,setModal]=useState(null);
  const [grassMsg]=useState(()=>GRASS[Math.floor(Math.random()*GRASS.length)]);
  const upd=useCallback((fn)=>setS(prev=>{const next=typeof fn==="function"?fn({...prev}):fn;save(next);return next;}),[]);

  // Merge built-in tracks with custom tracks
  const allTracks={...BUILTIN_TRACKS,...(S.customTracks||{})};

  const T=mkT(S.dark);
  window.__T=T;

  useEffect(()=>{
    const todayStr=today();
    setS(prev=>{
      let streak=prev.streak||0;
      if(prev.lastDate){const diff=(new Date(todayStr)-new Date(prev.lastDate))/86400000;if(diff>1)streak=0;else if(diff>=1)streak=streak+1;}
      const cap=prev.capDate===todayStr?prev.cap:null;
      const capDate=prev.capDate===todayStr?prev.capDate:null;
      const next={...prev,lastDate:todayStr,streak,cap,capDate};
      save(next);return next;
    });
  },[]);

  useEffect(()=>{save(S);},[S]);

  // Build custom track nav items
  const customTrackNavItems=Object.entries(S.customTracks||{}).map(([k,v])=>({p:`t-${k}`,icon:v.icon,label:v.name}));

  const NAV=[
    {sec:"Main"},
    {p:"today",icon:"🏠",label:"Today"},
    {p:"week",icon:"📅",label:"This week"},
    {p:"all-tasks",icon:"📋",label:"All tasks"},
    {sec:"Tracks"},
    {p:"t-sat",icon:"✏️",label:"SAT Prep"},
    {p:"t-res",icon:"🔬",label:"Research"},
    {p:"t-vln",icon:"🎻",label:"Violin"},
    {p:"t-vol",icon:"🤝",label:"Volunteering"},
    {p:"t-bio",icon:"🧬",label:"Biomed"},
    {p:"t-gwc",icon:"💻",label:"Girls Who Code"},
    {p:"t-frc",icon:"🤖",label:"FRC / Java"},
    {p:"t-yolo",icon:"📷",label:"YOLO + RPi"},
    {p:"t-int",icon:"💼",label:"Internship"},
    ...customTrackNavItems,
    {p:"manage-tracks",icon:"🗂️",label:"Add track"},
    {sec:"College & Aid"},
    {p:"colleges",icon:"🎓",label:"Colleges"},
    {p:"scholarships",icon:"💰",label:"Scholarships"},
    {sec:"Logs & Journal"},
    {p:"research",icon:"📓",label:"Research journal"},
    {sec:"Add"},
    {p:"add-task",icon:"➕",label:"New task"},
    {p:"add-school",icon:"📚",label:"School"},
    {p:"add-social",icon:"👥",label:"Social"},
    {p:"settings",icon:"⚙️",label:"Settings"},
  ];

  function pageContent(){
    if(page==="today")      return<TodayPage S={S} upd={upd} grassMsg={grassMsg} setModal={setModal} allTracks={allTracks}/>;
    if(page==="week")       return<WeekPage S={S} allTracks={allTracks}/>;
    if(page==="all-tasks")  return<AllTasksPage S={S} upd={upd} setModal={setModal} allTracks={allTracks}/>;
    if(page==="t-vol")      return<VolunteeringPage S={S} upd={upd}/>;
    if(page==="t-bio")      return<BiomPage S={S} upd={upd} setModal={setModal}/>;
    if(page==="manage-tracks") return<ManageTracksPage S={S} upd={upd} allTracks={allTracks}/>;
    if(page.startsWith("t-")) return<TrackPage track={page.slice(2)} S={S} upd={upd} setModal={setModal} allTracks={allTracks}/>;
    if(page==="colleges")   return<CollegePage S={S} upd={upd}/>;
    if(page==="scholarships")return<ScholarshipsPage S={S} upd={upd}/>;
    if(page==="research")   return<RJPage S={S} upd={upd}/>;
    if(page==="add-task")   return<AddTaskPage S={S} upd={upd} allTracks={allTracks}/>;
    if(page==="add-school") return<AddSchoolPage S={S} upd={upd}/>;
    if(page==="add-social") return<AddSocialPage S={S} upd={upd}/>;
    if(page==="settings")   return<SettingsPage S={S} upd={upd}/>;
    return null;
  }

  return(
    <div style={{padding:12,background:T.bg,minHeight:"100vh",fontFamily:"'DM Sans',sans-serif"}}>
      <div style={{display:"grid",gridTemplateColumns:"180px 1fr",minHeight:700,border:`1px solid ${T.border}`,borderRadius:14,overflow:"hidden",boxShadow:S.dark?"0 4px 32px rgba(0,0,0,.4)":"0 4px 24px rgba(100,90,160,.12)"}}>
        {/* Sidebar */}
        <div style={{background:T.surf,borderRight:`1px solid ${T.border}`,padding:"10px 0",display:"flex",flexDirection:"column",gap:1,overflowY:"auto"}}>
          <div style={{margin:"0 10px 10px",padding:"10px 12px",background:T.accBg,borderRadius:10,textAlign:"center"}}>
            <div style={{fontSize:16,fontWeight:700,color:T.acc,fontFamily:"'Lora',serif"}}>Momentum</div>
            <div style={{fontSize:10,color:T.mute,marginTop:1}}>{S.phase===1?"🌱 Phase 1":"🌸 Phase 2"}</div>
          </div>
          {NAV.map((n,i)=>{
            if(n.sec)return<div key={i} style={{fontSize:10,fontWeight:700,color:T.mute,padding:"8px 12px 2px",letterSpacing:".07em",textTransform:"uppercase"}}>{n.sec}</div>;
            const on=page===n.p;
            const trackKey=n.p?.startsWith("t-")?n.p.slice(2):null;
            const locked=trackKey&&S.phase===1&&PHASE1_LOCKED.includes(trackKey);
            return(
              <div key={i} onClick={()=>setPage(n.p)}
                style={{display:"flex",alignItems:"center",gap:7,padding:"6px 12px",fontSize:12,color:on?T.acc:locked?T.mute:T.sub,cursor:"pointer",borderLeft:on?`3px solid ${T.acc}`:"3px solid transparent",background:on?T.accBg:"transparent",fontWeight:on?700:400,transition:"all .12s",whiteSpace:"nowrap",overflow:"hidden"}}>
                <span style={{fontSize:14,flexShrink:0,opacity:locked?.5:1}}>{n.icon}</span>
                <span style={{overflow:"hidden",textOverflow:"ellipsis",flex:1}}>{n.label}</span>
                {locked&&<span style={{fontSize:9,color:T.mute,flexShrink:0}}>🔒</span>}
              </div>
            );
          })}
        </div>
        {/* Main */}
        <div style={{background:T.bg,padding:"16px 18px",overflowY:"auto",display:"flex",flexDirection:"column",gap:14}}>
          {pageContent()}
        </div>
      </div>
      {modal&&<TaskModal taskId={modal} S={S} upd={upd} onClose={()=>setModal(null)} allTracks={allTracks}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
